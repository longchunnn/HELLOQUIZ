<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Làm bài thi — HelloQuizz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/exam-taking.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="exam-header">
    <div class="exam-header__brand">
      <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#DC2626"/>
        <rect x="7" y="9" width="18" height="22" rx="4" fill="white"/>
        <rect x="15" y="9" width="18" height="22" rx="4" fill="white" opacity="0.85"/>
        <text x="20" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="#DC2626">?</text>
      </svg>
      <span style="white-space:nowrap;font-weight:900;"><span style="color:white;">Hello</span><span style="color:rgba(255,255,255,.55);">Quizz</span></span>
    </div>
    <div class="exam-header__title" id="exam-title">
      Đại số tuyến tính — Đề thi giữa kỳ 2026
    </div>
    <div class="exam-header__actions">
      <div class="timer" id="timer">
        <span class="material-symbols-rounded" style="font-size:1rem">timer</span>
        <span class="timer__value" id="timer-value">45:00</span>
      </div>
      <button class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,.3);font-size:.85rem;" onclick="if(confirm('Bạn có chắc muốn nộp bài không?')) window.location.href='exam-result.html'">
        <span class="material-symbols-rounded" style="font-size:.95rem">send</span>
        Nộp bài
      </button>
    </div>
  </header>

  <!-- LAYOUT -->
  <div class="exam-layout">

    <!-- Main question area -->
    <main class="exam-main">
      <div class="question-card" id="question-area">
        <div class="question-card__header">
          <span class="question-num" id="q-num">Câu 1 / 30</span>
          <button class="question-mark-btn" id="mark-btn" onclick="toggleMark()">
            <span class="material-symbols-rounded" style="font-size:.9rem">bookmark</span>
            Đánh dấu
          </button>
        </div>
        <p class="question-text" id="question-text">
          Cho ma trận A = [[2, 1], [1, 3]]. Hãy tính định thức det(A)?
        </p>
        <div class="options-list" id="options-list">
          <div class="option-item" onclick="selectOption(this, 0)">
            <div class="option-key">A</div>
            <p class="option-text">5</p>
          </div>
          <div class="option-item" onclick="selectOption(this, 1)">
            <div class="option-key">B</div>
            <p class="option-text">6</p>
          </div>
          <div class="option-item" onclick="selectOption(this, 2)">
            <div class="option-key">C</div>
            <p class="option-text">4</p>
          </div>
          <div class="option-item" onclick="selectOption(this, 3)">
            <div class="option-key">D</div>
            <p class="option-text">7</p>
          </div>
        </div>
      </div>

      <div class="question-nav-btns">
        <button class="btn btn-secondary" id="prev-btn" onclick="navigate(-1)">
          ← Câu trước
        </button>
        <button class="btn btn-primary" id="next-btn" onclick="navigate(1)">
          Câu tiếp →
        </button>
      </div>
    </main>

    <!-- Sidebar -->
    <aside class="exam-sidebar">
      <div class="progress-info">
        <div class="progress-info__row">
          <p class="progress-info__label">Tiến độ</p>
          <p class="progress-info__val" id="progress-text">3/30 câu</p>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-bar" style="width:10%"></div>
        </div>
      </div>

      <p class="sidebar-section-title">Điều hướng câu hỏi</p>
      <div class="question-navigator" id="question-nav">
        <!-- Generated by JS -->
      </div>

      <p class="sidebar-section-title">Chú giải</p>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot legend-dot--red"></div>Đang làm</div>
        <div class="legend-item"><div class="legend-dot legend-dot--green"></div>Đã trả lời</div>
        <div class="legend-item"><div class="legend-dot legend-dot--orange"></div>Đã đánh dấu</div>
        <div class="legend-item"><div class="legend-dot legend-dot--gray"></div>Chưa làm</div>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="if(confirm('Nộp bài?')) window.location.href='exam-result.html'">
        <span class="material-symbols-rounded" style="font-size:1rem">send</span>
        Nộp bài ngay
      </button>
      <div style="height:8px;"></div>
      <a href="dashboard.html" class="btn btn-secondary" style="width:100%;justify-content:center;">
        Quay lại Dashboard
      </a>
    </aside>
  </div>

<script src="assets/js/exam-taking.js"></script>
</body>
</html>
