<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Làm bài thi — HelloQuizz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/app-shared.css"/>
  <link rel="stylesheet" href="assets/css/exam-list.css"/>

</head>
<body>
<div class="app-layout">

  <!-- ========= SIDEBAR ========= -->
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#DC2626"/>
        <rect x="7" y="9" width="18" height="22" rx="4" fill="white"/>
        <rect x="15" y="9" width="18" height="22" rx="4" fill="white" opacity="0.85"/>
        <text x="20" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="#DC2626">?</text>
      </svg>
      <span class="sidebar-brand__name">Hello<span>Quizz</span></span>
    </div>
    <nav class="sidebar-nav">
      <p class="sidebar-nav__section-title">Menu chính</p>
      <a class="nav-link" href="dashboard.html">
        <span class="nav-icon material-symbols-rounded">dashboard</span> Tổng quan
      </a>
      <a class="nav-link active" href="exam-list.html">
        <span class="nav-icon material-symbols-rounded">quiz</span> Làm bài thi
      </a>
      <a class="nav-link" href="result-list.html">
        <span class="nav-icon material-symbols-rounded">bar_chart</span> Kết quả
      </a>
      <a class="nav-link" href="user-profile.html">
        <span class="nav-icon material-symbols-rounded">person</span> Hồ sơ
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user__avatar">N</div>
        <div class="sidebar-user__info">
          <p class="sidebar-user__name">Nguyễn Văn A</p>
          <p class="sidebar-user__role">Học sinh</p>
        </div>
      </div>
      <button class="sidebar-logout" onclick="window.location.href='landing.html'">
        <span class="material-symbols-rounded" style="font-size:1rem">logout</span> Đăng xuất
      </button>
    </div>
  </aside>

  <!-- ========= MAIN ========= -->
  <main class="app-main">
    <header class="app-header">
      <div class="app-header__left">
        <button class="sidebar-toggle" id="sidebar-toggle">
          <span class="material-symbols-rounded">menu</span>
        </button>
        <div>
          <p class="app-header__title">Làm bài thi</p>
          <p class="app-header__subtitle">Chọn đề thi bạn muốn làm</p>
        </div>
      </div>
      <div class="app-header__right">
        <button class="header-icon-btn theme-btn" onclick="document.documentElement.classList.toggle('dark')">
          <span class="material-symbols-rounded">dark_mode</span>
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="material-symbols-rounded">search</span>
          <input type="text" class="search-input" id="search-input" placeholder="Tìm kiếm đề thi..."/>
        </div>
        <select class="filter-select" id="filter-subject">
          <option value="">Tất cả môn học</option>
          <option value="Toán học">Toán học</option>
          <option value="Vật lý">Vật lý</option>
          <option value="Hóa học">Hóa học</option>
          <option value="Sinh học">Sinh học</option>
          <option value="Tiếng Anh">Tiếng Anh</option>
        </select>
        <select class="filter-select" id="filter-diff">
          <option value="">Tất cả cấp độ</option>
          <option value="easy">Dễ</option>
          <option value="medium">Trung bình</option>
          <option value="hard">Khó</option>
        </select>
      </div>

      <!-- Exam cards -->
      <div class="exam-grid" id="exam-grid"></div>

    </div>
  </main>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;"></div>

<script src="assets/js/exam-list.js"></script>
</body>
</html>
